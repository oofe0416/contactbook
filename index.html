<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聯絡簿</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts: 引入超美的手寫粉筆感 Klee One 字體 -->
    <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'washi': '#143022',      // 經典深綠黑板背景色
                        'ao': '#fde047',         // 黃色粉筆色
                        'ao-dark': '#eab308',    // 深黃色粉筆色
                        'sakura': '#f9a8d4',     // 粉紅粉筆色
                        'sakura-dark': '#f472b6',
                        'sumi': '#f3f4f6',       // 白色粉筆色
                        'wood': '#854d0e',       // 木製槽原木色
                        'wood-dark': '#713f12',  // 深木色
                        'board-card': '#1b3f2d',  // 稍亮一點的綠黑板色（用於卡片區塊）
                        'chalk-blue': '#7dd3fc'  // 藍色粉筆色
                    },
                    fontFamily: {
                        'sans': ['"Klee One"', '"Noto Sans TC"', 'sans-serif'],
                        'serif': ['"Klee One"', 'serif'],
                    }
                }
            }
        }
    </script>
    <style>
        /* 優先引入 Google Fonts 雲端字體庫 (含芫荽注音體 Bpmf Iansui) */
        @import url('https://fonts.googleapis.com/css2?family=Bpmf+Iansui&display=swap');

        body { 
            background-color: #143022; 
            color: #f3f4f6; 
            background-image: url('https://www.transparenttextures.com/patterns/black-chalk.png'); /* 疊加黑板粉筆灰材質 */
            font-family: 'Klee One', 'Noto Sans TC', sans-serif;
        }
        /* 木製外框大黑板樣式 */
        .wood-board {
            border: 12px solid #5c3a21;
            border-radius: 8px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.8), 0 10px 25px rgba(0,0,0,0.6);
            background-color: #143022;
            background-image: url('https://www.transparenttextures.com/patterns/black-chalk.png');
            border-style: ridge;
        }
        /* 粉筆手繪感點虛線 */
        .japanese-border { 
            border: 2px dashed rgba(253, 224, 71, 0.4) !important; 
            border-radius: 4px; 
            background-color: rgba(255, 255, 255, 0.02) !important; 
        }
        .japanese-border::after { display: none; }
        
        /* 表單元素全面黑板化 */
        input, select, textarea, [contenteditable="true"] {
            background-color: #0d2117 !important;
            color: #f3f4f6 !important;
            border: 1.5px dashed rgba(243, 244, 246, 0.3) !important;
            border-radius: 4px;
        }
        input:focus, select:focus, [contenteditable="true"]:focus {
            border-color: #fde047 !important;
            outline: none;
            box-shadow: 0 0 6px rgba(253, 224, 71, 0.3);
        }
        
        /* 統一文字預設粉筆高對比度 */
        h1, h2, h3, h4 {
            color: #fde047 !important; /* 重要標題預設黃粉筆色 */
            text-shadow: 0 0 2px rgba(253, 224, 71, 0.2);
        }
        
        /* 自訂滾動條（粉筆色系） */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #143022; }
        ::-webkit-scrollbar-thumb { background: #fde047; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #eab308; }
        
        .modal { display: none; background-color: rgba(13, 33, 23, 0.85); }
        .modal.active { display: flex; }
        .modal > div {
            background-image: url('https://www.transparenttextures.com/patterns/black-chalk.png') !important;
        }
        
        .toast {
            position: fixed; bottom: 20px; right: 20px;
            background: #fde047; color: #143022; padding: 12px 24px;
            border-radius: 4px; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transform: translateY(100px); opacity: 0; transition: all 0.3s ease;
            z-index: 1000; font-weight: bold;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.error { background: #fbcfe8; color: #143022; }
        
        /* 標籤徽章粉筆風格：白色文字配陰影，確保在任何底色上都清晰 */
        .tag-badge { padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; color: #ffffff !important; display: inline-block; font-weight: bold; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }
        
        /* 引入芫荽注音體 (Google Fonts 失敗時的本地與 CDN WOFF2 輕量壓縮版備援) */
        @font-face {
            font-family: 'Bpmf Iansui';
            src: local('Bpmf Iansui'), local('BpmfIansui'), local('芫荽注音體'), 
                 url('https://cdn.jsdelivr.net/gh/max32002/bpmf@master/webfonts/BpmfIansui-Regular.woff2') format('woff2');
            font-display: swap;
        }
        
        /* 編輯器相關樣式 */
        #entry-content:empty:before {
            content: attr(data-placeholder);
            color: #a3b8aa;
            pointer-events: none;
            display: block;
        }
        /* 在編輯器內預覽注音體時，確保給予足夠的行高以顯示注音 */
        #entry-content font[face*="Bpmf"] {
            line-height: 2.2;
            display: inline-block;
        }
        
        /* 讓編輯器與內容內的超連結有明顯樣式 (天藍色粉筆色) */
        a, #entry-content a { color: #7dd3fc !important; text-decoration: underline; font-weight: bold; }
        
        /* 修正 Tailwind 重置，讓文字編輯器的字體大小生效 (對應 1~7 等級為具體 px) */
        font[size="1"] { font-size: 12px; }
        font[size="2"] { font-size: 14px; }
        font[size="3"] { font-size: 16px; }
        font[size="4"] { font-size: 18px; }
        font[size="5"] { font-size: 20px; }
        font[size="6"] { font-size: 24px; }
        font[size="7"] { font-size: 36px; }
    </style>
</head>
<body class="font-sans min-h-screen flex flex-col">

    <!-- Header (原木木框質感頂部) -->
    <header class="bg-wood-dark text-sumi shadow-md relative z-10 border-b-4 border-wood">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-chalkboard text-2xl text-ao"></i>
                <h1 class="text-2xl font-serif font-bold tracking-wider flex items-center gap-2 !text-sumi">
                    <span id="main-system-title">和風學園 網路聯絡簿</span>
                    <button id="btn-edit-title" onclick="App.editSystemTitle()" class="hidden text-sm opacity-70 hover:opacity-100 transition"><i class="fa-solid fa-pen"></i></button>
                </h1>
            </div>
            <div class="flex items-center gap-4">
                <div id="user-info" class="hidden text-sm">
                    <span id="welcome-msg" class="mr-2 text-sumi"></span>
                    <span id="role-badge" class="bg-washi text-ao border border-ao/30 px-2 py-1 rounded text-xs font-bold"></span>
                </div>
                <button id="btn-login-modal" class="bg-washi text-ao border border-ao/50 px-4 py-1.5 rounded-full hover:bg-ao hover:text-washi transition shadow text-sm font-bold">
                    登入管理
                </button>
                <button id="btn-password-modal" class="hidden bg-gray-200 text-gray-700 px-4 py-1.5 rounded-full hover:bg-gray-300 transition shadow text-sm font-bold">
                    修改密碼
                </button>
                <button id="btn-logout" class="hidden bg-sakura text-washi px-4 py-1.5 rounded-full hover:bg-sakura-dark transition shadow text-sm font-bold">
                    登出
                </button>
            </div>
        </div>
    </header>

    <!-- Admin Toolbar (深黑板綠協同工具列 - 已修正字體顏色為白色) -->
    <div id="admin-toolbar" class="hidden bg-board-card text-white shadow-sm border-b border-dashed border-white/20">
        <div class="container mx-auto px-4 py-2 flex gap-4 text-sm overflow-x-auto">
            <button onclick="UI.openModal('entry-modal')" class="hover:text-ao transition flex items-center gap-1"><i class="fa-solid fa-plus"></i> 新增聯絡簿</button>
            <button id="btn-manage-users" onclick="UI.openModal('user-modal')" class="hidden hover:text-ao transition flex items-center gap-1"><i class="fa-solid fa-users"></i> 帳號管理</button>
            <button id="btn-manage-tags" onclick="UI.openModal('tag-modal')" class="hidden hover:text-ao transition flex items-center gap-1"><i class="fa-solid fa-tags"></i> 標籤管理</button>
            <button id="btn-manage-links" onclick="UI.openModal('link-modal')" class="hidden hover:text-ao transition flex items-center gap-1"><i class="fa-solid fa-link"></i> 新增資源/文件</button>
        </div>
    </div>

    <!-- Main Content (大黑板木外框主框架，底部預留空間放置粉筆槽) -->
    <main class="container mx-auto px-4 py-8 flex-grow flex flex-col md:flex-row gap-8 wood-board mt-6 mb-8 relative pb-16">
        
        <!-- Left/Center Column: Content -->
        <div class="w-full md:w-2/3 lg:w-3/4 flex flex-col gap-6">
            
            <!-- Important Links/Docs (重要文件與網站卡片) -->
            <section class="bg-board-card p-5 rounded-lg shadow-sm border-2 border-dashed border-white/20">
                <h2 class="text-xl font-serif text-ao mb-4 border-b border-dashed border-white/10 pb-2"><i class="fa-regular fa-folder-open mr-2"></i>重要文件與網站</h2>
                <div id="links-container" class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    <!-- Links injected here -->
                    <div class="text-gray-400 text-sm">載入中...</div>
                </div>
            </section>

            <!-- Contact Book List (今日交代功課卡片) -->
            <section>
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-end mb-4 border-b-2 border-dashed border-ao pb-2 gap-2">
                    <div class="flex items-center gap-3">
                        <h2 class="text-2xl font-serif text-ao"><i class="fa-solid fa-book-open mr-2"></i>今日交代功課</h2>
                        <span id="current-filter-text" class="text-sm text-yellow-200 bg-white/5 px-2 py-1 rounded border border-dashed border-white/10 hidden">顯示全部</span>
                    </div>
                </div>
                <div id="entries-container" class="flex flex-col gap-4">
                    <!-- Entries injected here -->
                    <div class="text-center py-10 text-gray-400">載入中...</div>
                </div>
            </section>
        </div>

        <!-- Right Column: Sidebar (Info & Calendar) -->
        <div class="w-full md:w-1/3 lg:w-1/4">
            <div class="sticky top-4 flex flex-col gap-4">
                
                <!-- Calendar -->
                <div class="bg-board-card rounded-lg shadow-sm border-2 border-dashed border-white/20 overflow-hidden">
                    <div class="bg-ao-dark text-washi p-3 flex justify-between items-center font-bold">
                        <button onclick="Calendar.prevMonth()" class="hover:text-white"><i class="fa-solid fa-chevron-left"></i></button>
                        <h3 id="calendar-month" class="font-serif font-bold text-lg text-washi !text-washi">2023年 10月</h3>
                        <button onclick="Calendar.nextMonth()" class="hover:text-white"><i class="fa-solid fa-chevron-right"></i></button>
                    </div>
                    <div class="p-4">
                        <div class="grid grid-cols-7 gap-1 text-center text-xs font-bold text-yellow-100 mb-2">
                            <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
                        </div>
                        <div id="calendar-grid" class="grid grid-cols-7 gap-1 text-center text-sm">
                            <!-- Calendar days injected here -->
                        </div>
                    </div>
                    <div class="bg-black/10 p-3 text-xs text-gray-300 border-t border-dashed border-white/10">
                        <i class="fa-solid fa-circle text-ao mr-1 text-[8px]"></i>表示當日有聯絡簿<br>
                        點擊日期可篩選該日內容
                    </div>
                </div>
            </div>
        </div>

        <!-- 🎨 粉筆夾與板擦收納槽 (完美結合並還原上傳的 image_e4b765.png 插圖！) -->
        <div class="absolute bottom-0 left-0 right-0 h-8 bg-gradient-to-r from-amber-800 via-amber-700 to-amber-800 border-t-2 border-amber-900 flex items-center justify-start px-8 gap-4 select-none z-10 rounded-b shadow-inner">
            <!-- 白色粉筆 -->
            <div class="w-12 h-3 bg-slate-100 rounded-full rotate-6 shadow border-b border-slate-300" title="白色粉筆"></div>
            <!-- 粉紅粉筆 -->
            <div class="w-14 h-3 bg-pink-300 rounded-full -rotate-3 shadow border-b border-pink-400" title="粉紅粉筆"></div>
            <!-- 黃色粉筆 -->
            <div class="w-10 h-3 bg-yellow-200 rounded-full rotate-12 shadow border-b border-yellow-300" title="黃色粉筆"></div>
            <!-- 藍色粉筆 -->
            <div class="w-11 h-3 bg-sky-200 rounded-full -rotate-6 shadow border-b border-sky-300" title="藍色粉筆"></div>
            <!-- 木製板擦 (橘黃底 + 黑頂毛氈，對應插圖設計) -->
            <div class="ml-auto w-20 h-5 bg-gradient-to-r from-amber-600 to-amber-500 rounded flex flex-col justify-between shadow border border-amber-700" title="板擦">
                <div class="w-full h-1.5 bg-neutral-800 rounded-t"></div>
                <div class="w-full h-1 bg-amber-800"></div>
            </div>
        </div>

    </main>

    <!-- Footer -->
    <footer class="bg-wood-dark text-sumi text-center py-6 text-sm mt-auto border-t-4 border-wood">
        <p>© <span id="footer-year">2026</span> <span id="footer-system-title">和風學園 網路聯絡簿</span>. All rights reserved.</p>
    </footer>

    <!-- Modals -->
    
    <!-- Login Modal -->
    <div id="login-modal" class="modal fixed inset-0 bg-black bg-opacity-50 z-50 justify-center items-center">
        <div class="bg-board-card p-8 rounded-lg shadow-xl w-full max-w-sm border-t-4 border-ao">
            <h2 class="text-2xl font-serif text-center mb-6 text-ao">系統登入</h2>
            <form id="login-form" class="space-y-4" onsubmit="event.preventDefault(); Auth.login();">
                <div>
                    <label class="block text-sm font-bold mb-1 text-gray-200">帳號</label>
                    <input type="text" id="login-username" required class="w-full p-2 border rounded focus:border-ao focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold mb-1 text-gray-200">密碼</label>
                    <input type="password" id="login-password" required class="w-full p-2 border rounded focus:border-ao focus:outline-none">
                </div>
                <div class="flex gap-2 pt-4">
                    <button type="button" onclick="UI.closeModal('login-modal')" class="w-1/3 bg-gray-600 text-white py-2 rounded hover:bg-gray-700 transition">取消</button>
                    <button type="submit" class="w-2/3 bg-ao text-washi py-2 rounded hover:bg-ao-dark transition">登入</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Entry Modal (Add/Edit) -->
    <div id="entry-modal" class="modal fixed inset-0 bg-black bg-opacity-50 z-50 justify-center items-center p-4">
        <div class="bg-board-card rounded-lg shadow-xl w-full max-w-2xl max-h-[90vh] flex flex-col border-t-4 border-ao">
            <div class="p-4 border-b border-dashed border-white/10 flex justify-between items-center bg-board-card">
                <h2 id="entry-modal-title" class="text-xl font-serif text-ao font-bold">新增聯絡簿</h2>
                <button onclick="UI.closeModal('entry-modal')" class="text-gray-400 hover:text-white"><i class="fa-solid fa-times text-xl"></i></button>
            </div>
            <div class="p-6 overflow-y-auto">
                <form id="entry-form" class="space-y-4" onsubmit="event.preventDefault(); App.saveEntry();">
                    <input type="hidden" id="entry-id">
                    <div>
                        <label class="block text-sm font-bold mb-1 text-gray-200">日期</label>
                        <input type="date" id="entry-date" required class="w-full p-2 border rounded focus:border-ao focus:outline-none bg-white">
                    </div>
                    <div>
                        <label id="entry-tag-label" class="block text-sm font-bold mb-1 text-gray-200">點擊標籤，即可插入至下方內容中</label>
                        <div id="entry-tags-container" class="flex flex-wrap gap-2 p-2 border rounded bg-black/20 min-h-[42px] border-dashed border-white/20">
                            <!-- Buttons injected here -->
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-1 text-gray-200">內容 (支援多行與格式)</label>
                        
                        <!-- 簡易文字編輯器工具列 -->
                        <div class="flex flex-wrap gap-2 mb-2 p-1.5 border rounded bg-black/30 items-center border-dashed border-white/20">
                            <!-- 字型選擇器 -->
                            <select onchange="document.execCommand('fontName', false, this.value); this.selectedIndex=0;" class="border rounded px-2 py-1 text-sm focus:outline-none focus:border-ao cursor-pointer">
                                <option value="">字型</option>
                                <option value="Klee One">預設粉筆字</option>
                                <option value="Bpmf Iansui">芫荽注音體</option>
                            </select>
                            
                            <select onchange="document.execCommand('fontSize', false, this.value); this.selectedIndex=0;" class="border rounded px-2 py-1 text-sm focus:outline-none focus:border-ao cursor-pointer">
                                <option value="">字體大小</option>
                                <option value="1">12</option>
                                <option value="2">14</option>
                                <option value="3">16</option>
                                <option value="4">18</option>
                                <option value="5">20</option>
                                <option value="6">24</option>
                                <option value="7">36</option>
                            </select>
                            <div class="flex items-center gap-1 bg-black/40 border border-dashed border-white/20 rounded px-1">
                                <span class="text-xs text-gray-300 pl-1">顏色:</span>
                                <input type="color" onchange="document.execCommand('foreColor', false, this.value)" title="文字顏色" class="w-7 h-7 p-0 border-0 cursor-pointer rounded bg-transparent">
                            </div>
                            <div class="h-6 w-px bg-white/20 mx-1"></div>
                            <button type="button" onclick="document.execCommand('bold', false, null)" class="w-8 h-8 flex items-center justify-center bg-black/40 border border-dashed border-white/20 hover:bg-black/20 rounded font-bold text-white transition" title="粗體">B</button>
                            <button type="button" onclick="document.execCommand('italic', false, null)" class="w-8 h-8 flex items-center justify-center bg-black/40 border border-dashed border-white/20 hover:bg-black/20 rounded italic text-white transition" title="斜體">I</button>
                            <button type="button" onclick="document.execCommand('underline', false, null)" class="w-8 h-8 flex items-center justify-center bg-black/40 border border-dashed border-white/20 hover:bg-black/20 rounded underline text-white transition" title="底線">U</button>
                            <div class="h-6 w-px bg-white/20 mx-1"></div>
                            <button type="button" onclick="App.insertLink()" class="w-8 h-8 flex items-center justify-center bg-black/40 border border-dashed border-white/20 hover:bg-black/20 rounded text-white transition" title="插入超連結"><i class="fa-solid fa-link"></i></button>
                        </div>
                        <!-- 取代原本的 textarea，改用 contenteditable 讓排版生效 -->
                        <div id="entry-content" contenteditable="true" data-placeholder="如：&#10;1. 數卷x1&#10;2. 國生字" class="w-full p-3 border rounded focus:border-ao focus:outline-none bg-white min-h-[200px] overflow-y-auto" style="line-height: 1.6;"></div>
                    </div>
                    <div class="flex justify-end gap-3 pt-2">
                        <button type="button" onclick="UI.closeModal('entry-modal')" class="bg-gray-600 text-white px-6 py-2 rounded hover:bg-gray-700 transition border border-dashed border-white/10">取消</button>
                        <button type="submit" class="bg-ao text-washi px-6 py-2 rounded hover:bg-ao-dark transition font-bold">儲存</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Fullscreen Presentation Modal (全螢幕展示大黑板) -->
    <div id="fullscreen-modal" class="modal fixed inset-0 bg-washi z-[100] flex-col overflow-y-auto">
        <div class="sticky top-0 bg-wood-dark text-sumi p-4 shadow-md flex justify-between items-center z-20 border-b-4 border-wood">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-chalkboard text-lg text-ao"></i>
                <h2 class="text-lg md:text-xl font-serif font-bold tracking-normal !text-sumi">聯絡簿全螢幕展示</h2>
            </div>
            <!-- 加入 flex 容器包裝時鐘與關閉按鈕 -->
            <div class="flex items-center gap-4 md:gap-6">
                <!-- 動態時鐘 -->
                <div id="fs-current-time" class="text-2xl md:text-4xl font-bold font-mono tracking-widest opacity-90 text-ao"></div>
                
                <button onclick="UI.closeModal('fullscreen-modal')" class="bg-washi text-ao border border-ao/50 hover:bg-ao hover:text-washi transition px-3 py-1.5 md:px-4 md:py-2 rounded-full text-sm md:text-base font-bold flex items-center gap-2">
                    <i class="fa-solid fa-times"></i> 關閉全螢幕
                </button>
            </div>
        </div>
        <!-- 放寬容器寬度以容納雙欄，並移除上方間距 (pt-0) -->
        <div class="container mx-auto px-4 pt-4 pb-20 max-w-[95%]">
            <!-- 雙欄內容將由 JS 動態注入於此 -->
            <div id="fs-container">
                <!-- Content Injected here -->
            </div>
        </div>
    </div>

    <!-- User Management Modal -->
    <div id="user-modal" class="modal fixed inset-0 bg-black bg-opacity-50 z-50 justify-center items-center p-4">
        <div class="bg-board-card rounded-lg shadow-xl w-full max-w-3xl flex flex-col border-t-4 border-ao">
            <div class="p-4 border-b border-dashed border-white/10 flex justify-between items-center bg-board-card">
                <h2 class="text-xl font-serif text-ao font-bold">帳號管理 (僅管理員)</h2>

    <!-- Custom Toast -->
    <div id="toast" class="toast">訊息</div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Global State
        window.State = {
            currentUser: null,
            isGuest: true,
            entries: [],
            links: [],
            tags: [],
            users: [],
            system: null,
            searchQuery: '',
            selectedDate: null,
            currentCalendarDate: new Date()
        };

        // UI Utilities
        window.UI = {
            showToast: (msg, isError = false) => {
                const toast = document.getElementById('toast');
                toast.textContent = msg;
                toast.className = `toast show ${isError ? 'error' : ''}`;
                setTimeout(() => toast.className = 'toast', 3000);
            },
            openModal: (id) => {
                document.getElementById(id).classList.add('active');
                if(id === 'entry-modal' && !document.getElementById('entry-id').value) {
                    
                    // 若有在日曆點選特定日期，優先使用該日期，否則使用今天
                    let defaultDate = State.selectedDate;
                    if (!defaultDate) {
                        const d = new Date();
                        defaultDate = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
                    }

                    document.getElementById('entry-date').value = defaultDate;
                    document.getElementById('entry-content').innerHTML = '';
                    document.getElementById('entry-content').focus();
                }
            },
            closeModal: (id) => {
                document.getElementById(id).classList.remove('active');
                if(id === 'entry-modal') {
                    document.getElementById('entry-form').reset();
                    document.getElementById('entry-content').innerHTML = ''; // 清空編輯器
                }
                if(id === 'login-modal') document.getElementById('login-form').reset();
                if(id === 'password-modal') document.getElementById('password-form').reset();
                if(id === 'tag-modal') document.getElementById('tag-form').reset();
                if(id === 'user-modal') document.getElementById('user-form').reset();
                if(id === 'link-modal') {
                    document.getElementById('link-form').reset();
                    document.getElementById('link-id').value = '';
                }
                document.getElementById('entry-id').value = '';
            },
            escapeHtml: (unsafe) => {
                return (unsafe || '').toString()
                     .replace(/&/g, "&amp;")
                     .replace(/</g, "&lt;")
                     .replace(/>/g, "&gt;")
                     .replace(/"/g, "&quot;")
                     .replace(/'/g, "&#039;");
            },
            formatDateTime: (timestamp) => {
                if (!timestamp) return '--/--/-- --:--';
                const d = new Date(timestamp);
                const pad = (n) => String(n).padStart(2, '0');
                const minguoYear = d.getFullYear() - 1911;
                return `${minguoYear}/${pad(d.getMonth() + 1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
            },
            getWeekdayStr: (dateStr) => {
                if (!dateStr) return '';
                const d = new Date(dateStr);
                if (isNaN(d.getTime())) return '';
                const weekdays = ['(日)', '(一)', '(二)', '(三)', '(四)', '(五)', '(六)'];
                return weekdays[d.getDay()];
            },
            toMinguo: (dateStr) => {
                if (!dateStr) return '';
                const parts = dateStr.split('-');
                if (parts.length !== 3) return dateStr;
                return `${parts[0] - 1911}/${parts[1]}/${parts[2]}`;
            },
            updateClock: () => {
                // 每秒更新全螢幕模式下的時鐘
                const el = document.getElementById('fs-current-time');
                if (el) {
                    const d = new Date();
                    const pad = (n) => String(n).padStart(2, '0');
                    el.textContent = `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
                }
            }
        };

        // =========================================================
        // ⚠️ 第 1 步：請將以下內容替換為您從 Firebase 後台取得的 Config ⚠️
        // =========================================================
const firebaseConfig = {
  apiKey: "AIzaSyBe4I80dbvsPxqZB69JeM3Pqk2JfnJ7Sho",
  authDomain: "contactbook-e1cd4.firebaseapp.com",
  projectId: "contactbook-e1cd4",
  storageBucket: "contactbook-e1cd4.firebasestorage.app",
  messagingSenderId: "219122874931",
  appId: "1:219122874931:web:9f21a451b89711e7f14146"
};

        // =========================================================

        let app, auth, db;
        let useMockDB = false;
        
        try {
            // 檢查是否有填寫 apiKey，若無則使用本機模擬模式 (Local Storage)
            if (!firebaseConfig.apiKey || firebaseConfig.apiKey === "您的 API KEY") {
                useMockDB = true;
                console.log("⚠️ 未檢測到有效的 Firebase 金鑰，已啟用【本機模擬資料庫模式】");
            } else {
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                console.log("✅ Firebase 初始化成功！");
            }
        } catch (e) {
            useMockDB = true;
            console.error("Firebase 初始化發生錯誤，已切換回本機模擬模式:", e);
        }

        // 本機模擬資料庫 (讓介面在無雲端庫狀態下仍可操作)
        const LocalDB = {
            data: JSON.parse(localStorage.getItem('mock_school_db')) || { entries: [], links: [], tags: [], users: [], system: [] },
            listeners: {},
            save: function() { localStorage.setItem('mock_school_db', JSON.stringify(this.data)); },
            trigger: function(col) { if(this.listeners[col]) this.listeners[col]({ docs: this.data[col].map(d => ({ id: d.id, data: () => d })) }); },
            add: async function(col, docData) { 
                const id = Math.random().toString(36).substr(2, 9);
                this.data[col].push({ id, ...docData });
                this.save(); this.trigger(col);
                return { id };
            },
            update: async function(col, id, docData) {
                const idx = this.data[col].findIndex(d => d.id === id);
                if(idx > -1) { this.data[col][idx] = { ...this.data[col][idx], ...docData }; this.save(); this.trigger(col); }
            },
            delete: async function(col, id) {
                this.data[col] = this.data[col].filter(d => d.id !== id);
                this.save(); this.trigger(col);
            }
        };

        // 資料庫 API 封裝 (自動判斷要用 Firebase 還是 LocalDB)
        window.API = {
            onSnapshot: (colName, cb) => {
                if (useMockDB) {
                    LocalDB.listeners[colName] = cb;
                    setTimeout(() => LocalDB.trigger(colName), 0);
                } else {
                    onSnapshot(collection(db, colName), cb, (err) => console.error("Firestore 讀取錯誤:", err));
                }
            },
            addDoc: async (colName, data) => {
                if (useMockDB) return LocalDB.add(colName, data);
                else return addDoc(collection(db, colName), data);
            },
            updateDoc: async (colName, id, data) => {
                if (useMockDB) return LocalDB.update(colName, id, data);
                else return updateDoc(doc(db, colName, id), data);
            },
            deleteDoc: async (colName, id) => {
                if (useMockDB) return LocalDB.delete(colName, id);
                else return deleteDoc(doc(db, colName, id));
            }
        };

        // Authentication & User Management
        window.Auth = {
            init: async () => {
                if (!useMockDB) {
                    try { 
                        await signInAnonymously(auth); 
                    } catch (e) { 
                        console.error("Firebase 匿名登入失敗，請確認是否於後台啟用匿名登入功能", e); 
                    }
                }
                
                const sessionData = sessionStorage.getItem('school_app_session');
                if(sessionData) {
                    State.currentUser = JSON.parse(sessionData);
                    State.isGuest = false;
                }
                Auth.updateUI();
            },
            login: () => {
                const acc = document.getElementById('login-username').value;
                const pass = document.getElementById('login-password').value;
                
                if (State.users.length === 0 && acc === 'admin' && pass === 'admin') {
                    State.currentUser = { id: 'admin-1', account: 'admin', role: 'admin', name: '系統管理員' };
                    State.isGuest = false;
                    sessionStorage.setItem('school_app_session', JSON.stringify(State.currentUser));
                    UI.closeModal('login-modal');
                    UI.showToast(`歡迎回來，系統管理員`);
                    Auth.updateUI();
                    App.renderEntries();
                    return;
                }

                const user = State.users.find(u => u.account === acc && u.password === pass);
                if (user) {
                    State.currentUser = { id: user.id, account: user.account, role: user.role, name: user.name };
                    State.isGuest = false;
                    sessionStorage.setItem('school_app_session', JSON.stringify(State.currentUser));
                    UI.closeModal('login-modal');
                    UI.showToast(`歡迎回來，${user.name}`);
                    Auth.updateUI();
                    App.renderEntries();
                } else {
                    UI.showToast("帳號或密碼錯誤", true);
                }
            },
            logout: () => {
                State.currentUser = null;
                State.isGuest = true;
                sessionStorage.removeItem('school_app_session');
                UI.showToast("已登出");
                Auth.updateUI();
                App.renderEntries();
            },
            updateUI: () => {
                const btnLogin = document.getElementById('btn-login-modal');
                const btnLogout = document.getElementById('btn-logout');
                const btnPassword = document.getElementById('btn-password-modal');
                const userInfo = document.getElementById('user-info');
                const adminToolbar = document.getElementById('admin-toolbar');
                
                if (State.isGuest) {
                    btnLogin.classList.remove('hidden');
                    btnLogout.classList.add('hidden');
                    if(btnPassword) btnPassword.classList.add('hidden');
                    userInfo.classList.add('hidden');
                    adminToolbar.classList.add('hidden');
                } else {
                    btnLogin.classList.add('hidden');
                    btnLogout.classList.remove('hidden');
                    if(btnPassword) btnPassword.classList.remove('hidden');
                    userInfo.classList.remove('hidden');
                    adminToolbar.classList.remove('hidden');
                    
                    document.getElementById('welcome-msg').textContent = State.currentUser.name;
                    const badge = document.getElementById('role-badge');
                    
                    const isAdmin = State.currentUser.role === 'admin';
                    badge.textContent = isAdmin ? '管理員' : '協作者';
                    
                    document.getElementById('btn-manage-users').classList.toggle('hidden', !isAdmin);
                    document.getElementById('btn-manage-tags').classList.toggle('hidden', !isAdmin);
                    document.getElementById('btn-manage-links').classList.toggle('hidden', !isAdmin);
                    
                    const btnEditTitle = document.getElementById('btn-edit-title');
                    if (btnEditTitle) btnEditTitle.classList.toggle('hidden', !isAdmin);
                }
            },
            createUser: async () => {
                if (!State.currentUser || State.currentUser.role !== 'admin') return UI.showToast("無權限", true);
                
                const acc = document.getElementById('new-user-account').value;
                const pass = document.getElementById('new-user-pass').value;
                const name = document.getElementById('new-user-name').value;
                const role = document.getElementById('new-user-role').value;

                if(State.users.some(u => u.account === acc)) {
                    return UI.showToast("帳號已存在", true);
                }

                try {
                    await API.addDoc('users', { account: acc, password: pass, name, role });
                    UI.showToast("帳號新增成功");
                    document.getElementById('user-form').reset();
                } catch(e) {
                    UI.showToast("新增失敗", true);
                }
            },
            changePassword: async () => {
                if (!State.currentUser) return;
                const oldPass = document.getElementById('old-password').value;
                const newPass = document.getElementById('new-password').value;
                const confirmPass = document.getElementById('confirm-password').value;

                const userRecord = State.users.find(u => u.id === State.currentUser.id);
                if (!userRecord || userRecord.password !== oldPass) {
                    return UI.showToast("原密碼錯誤", true);
                }
                if (newPass !== confirmPass) {
                    return UI.showToast("兩次輸入的新密碼不一致", true);
                }

                try {
                    await API.updateDoc('users', State.currentUser.id, { password: newPass });
                    UI.showToast("密碼修改成功");
                    UI.closeModal('password-modal');
                } catch (e) {
                    UI.showToast("密碼修改失敗", true);
                }
            },
            resetUserPassword: async (id) => {
                if (!State.currentUser || State.currentUser.role !== 'admin') return;
                const newPass = prompt("請輸入該帳號的新密碼：");
                if (newPass && newPass.trim() !== "") {
                    try {
                        await API.updateDoc('users', id, { password: newPass.trim() });
                        UI.showToast("密碼已成功重設");
                    } catch(e) {
                        UI.showToast("重設失敗", true);
                    }
                }
            },
            deleteUser: async (id) => {
                if (!State.currentUser || State.currentUser.role !== 'admin') return;
                if(State.currentUser.id === id) return UI.showToast("無法刪除自己", true);
                
                try {
                    await API.deleteDoc('users', id);
                    UI.showToast("帳號已刪除");
                } catch(e) {
                    UI.showToast("刪除失敗", true);
                }
            }
        };

        // Main App Logic
        window.App = {
            init: () => {
                // 自動更新底部版權年份 (民國年)
                document.getElementById('footer-year').textContent = new Date().getFullYear() - 1911;

                // 啟動全螢幕時鐘 (每秒更新一次)
                UI.updateClock();
                setInterval(UI.updateClock, 1000);

                // 預設：首頁載入時自動選取「今天」的日期
                const d = new Date();
                State.selectedDate = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;

                document.getElementById('btn-login-modal').addEventListener('click', () => UI.openModal('login-modal'));
                document.getElementById('btn-logout').addEventListener('click', Auth.logout);
                const btnPasswordModal = document.getElementById('btn-password-modal');
                if(btnPasswordModal) btnPasswordModal.addEventListener('click', () => UI.openModal('password-modal'));
                
                App.startListeners();
            },
            startListeners: () => {
                API.onSnapshot('entries', (snapshot) => {
                    State.entries = snapshot.docs.map(doc => ({id: doc.id, ...doc.data()}));
                    App.renderEntries();
                    Calendar.render();
                });

                API.onSnapshot('links', (snapshot) => {
                    State.links = snapshot.docs.map(doc => ({id: doc.id, ...doc.data()}));
                    App.renderLinks();
                });

                API.onSnapshot('tags', (snapshot) => {
                    State.tags = snapshot.docs.map(doc => ({id: doc.id, ...doc.data()}));
                    App.renderTagCheckboxes();
                    App.renderManageTags();
                    App.renderEntries();
                });

                API.onSnapshot('users', async (snapshot) => {
                    State.users = snapshot.docs.map(doc => ({id: doc.id, ...doc.data()}));
                    if(State.users.length === 0) {
                        try {
                            await API.addDoc('users', { account: 'admin', password: 'admin', name: '系統管理員', role: 'admin' });
                        } catch(e) {}
                    }
                    App.renderUserList();
                });

                API.onSnapshot('system', async (snapshot) => {
                    if (snapshot.docs.length === 0) {

            // 將舊式或瀏覽器產生的 <font> 標籤，強制轉換為絕對生效的 <span> inline-style
            convertFontToSpan: (htmlStr) => {
                if (!htmlStr) return '';
                return htmlStr.replace(/<font\s+([^>]+)>/gi, (match, attrs) => {
                    let style = '';
                    const sizeMatch = attrs.match(/size=["']?(\d)["']?/i);
                    if (sizeMatch) {
                        const sizes = {'1':'12px', '2':'14px', '3':'16px', '4':'18px', '5':'20px', '6':'24px', '7':'36px'};
                        style += `font-size: ${sizes[sizeMatch[1]] || '16px'} !important; `;
                    }
                    const colorMatch = attrs.match(/color=["']?([^"'\s>]+)["']?/i);
                    if (colorMatch) {
                        style += `color: ${colorMatch[1]} !important; `;
                    }
                    
                    // 更嚴謹的解析 fontName，避免空白與引號的干擾
                    let fontName = '';
                    const faceMatch1 = attrs.match(/face\s*=\s*["']([^"']+)["']/i);
                    const faceMatch2 = attrs.match(/face\s*=\s*([^"'\s>]+)/i);
                    if (faceMatch1) {
                        fontName = faceMatch1[1].trim();
                    } else if (faceMatch2) {
                        fontName = faceMatch2[1].trim();
                    }
                    
                    if (fontName) {
                        fontName = fontName.replace(/['"]/g, ''); // 清除多餘單雙引號
                        style += `font-family: '${fontName}', 'Klee One', sans-serif !important; `;
                        // 若為注音體，自動加上較大的行高避免注音符號被切掉
                        if (fontName.includes('Bpmf')) {
                            style += `line-height: 2.2 !important; display: inline-block; `;
                        }
                    }
                    
                    return `<span style="${style}">`;
                }).replace(/<\/font>/gi, '</span>');
            },

            // 處理內容標籤渲染 (共用於列表與全螢幕)
            formatContentWithTags: (rawContent) => {
                let content = rawContent || '';
                
                // 1. 還原被意外變成純文字的 HTML 標籤 (增加對 a 標籤的支援)
                content = content.replace(/&lt;(\/?(?:font|span|div|br|p|b|i|u|strong|em|a)(?:\s+[^&>]*?)?)&gt;/gi, '<$1>');
                
                // 2. 兼容舊版純文字：如果沒有包含任何區塊標籤，則將 \n 轉為 <br>
                if (!/<(?:br|div|p|h\d|ul|li|ol|table|tr|td|th)\b/i.test(content)) {
                    content = content.replace(/\n/g, '<br>');
                }
                
                // 3. 基本 XSS 防護
                content = content.replace(/<script\b[^<]*(?:(?!<\/script>)<[^<]*)*<\/script>/gi, '');
                
                // 4. 將 <font> 轉換為 <span> (解決 Tailwind CSS 覆蓋字體樣式的問題)
                content = App.convertFontToSpan(content);

                // 4.5 確保超連結具有 target="_blank" 並套用統一顯示樣式 (使用粉筆天藍色)
                content = content.replace(/<a\s+href=["']([^"']+)["']([^>]*)>/gi, (match, url, rest) => {
                    let cleanRest = rest.replace(/\btarget=["'][^"']*["']/gi, '').replace(/\bclass=["'][^"']*["']/gi, '');
                    return `<a href="${url}" target="_blank" rel="noopener noreferrer" class="text-sky-300 hover:text-sky-200 underline font-bold" ${cleanRest}>`;
                });
                
                // 5. 動態替換標籤為粉筆風格 Badge
                State.tags.forEach(t => {
                    const safeTagName = UI.escapeHtml(t.name);
                    const badgeHtml = `<span class="tag-badge whitespace-nowrap mx-1 relative -top-[1px] shadow-sm align-middle" style="background-color: ${t.color}; font-size: 0.85em; padding: 4px 10px; color: #ffffff !important;">${safeTagName}</span>`;
                    const regex = new RegExp(`【${safeTagName}】`, 'g');
                    content = content.replace(regex, badgeHtml);
                });
                return content;
            },

            insertLink: () => {
                const selection = window.getSelection();
                if (selection.rangeCount === 0) return;
                const range = selection.getRangeAt(0);

                const url = prompt("請輸入超連結網址 (例如：https://...)：", "https://");
                if (url) {
                    selection.removeAllRanges();
                    selection.addRange(range);
                    document.execCommand('createLink', false, url);
                }
            },

            insertTagToContent: (tagName) => {
                const editor = document.getElementById('entry-content');
                const insertText = `【${tagName}】`;
                
                editor.focus();
                
                const selection = window.getSelection();
                if (selection.getRangeAt && selection.rangeCount > 0) {
                    const range = selection.getRangeAt(0);
                    
                    let isInside = false;
                    let node = range.commonAncestorContainer;
                    while(node) {
                        if (node === editor) { isInside = true; break; }
                        node = node.parentNode;
                    }
                    
                    if (isInside) {
                        range.deleteContents();
                        const textNode = document.createTextNode(insertText);
                        range.insertNode(textNode);
                        
                        range.setStartAfter(textNode);
                        range.setEndAfter(textNode);
                        selection.removeAllRanges();
                        selection.addRange(range);
                        return;
                    }
                }
                
                editor.appendChild(document.createTextNode(insertText));
                
                const newRange = document.createRange();
                newRange.selectNodeContents(editor);
                newRange.collapse(false);
                selection.removeAllRanges();
                selection.addRange(newRange);
            },

                setTimeout(() => {
                    const observer = new IntersectionObserver((entries, obs) => {
                        entries.forEach(change => {
                            if (change.isIntersecting) {
                                const id = change.target.getAttribute('data-entry-id');
                                const viewedKey = 'entry_viewed_' + id;
                                // 確保同一個瀏覽器 session (無痕或重開瀏覽器前) 內，每一篇只會+1次，避免重複灌水
                                if (!sessionStorage.getItem(viewedKey)) {

                const color = document.getElementById('new-tag-color').value;
                try {
                    await API.addDoc('tags', { name, color });
                    document.getElementById('new-tag-name').value = '';
                    UI.showToast("標籤新增成功");
                } catch(e) { UI.showToast("新增失敗", true); }
            },
            deleteTag: async (id) => {
                if(!State.currentUser || State.currentUser.role !== 'admin') return;
                try { await API.deleteDoc('tags', id); UI.showToast("標籤已刪除"); } 
                catch(e) { UI.showToast("刪除失敗", true); }
            },
            renderTagCheckboxes: () => {
                const entryContainer = document.getElementById('entry-tags-container');
                const linkContainer = document.getElementById('link-tags-container');
                
                if(entryContainer) {
                    entryContainer.innerHTML = State.tags.map(tag => `
                        <button type="button" onclick="App.insertTagToContent('${UI.escapeHtml(tag.name)}')" class="inline-flex items-center gap-1 bg-black/30 px-2 py-1 border border-dashed border-white/20 rounded cursor-pointer hover:bg-black/50 transition shadow-sm">
                            <span class="text-sm flex items-center gap-1 text-gray-100">
                                <span class="w-3 h-3 rounded-full inline-block" style="background-color:${tag.color}"></span>
                                + ${UI.escapeHtml(tag.name)}
                            </span>
                        </button>
                    `).join('');
                }

                if(linkContainer) {
                    linkContainer.innerHTML = State.tags.map(tag => `
                        <label class="inline-flex items-center gap-1 bg-black/30 px-2 py-1 border border-dashed border-white/20 rounded cursor-pointer hover:bg-black/50">
                            <input type="checkbox" name="link-tags" value="${tag.id}" class="accent-ao">
                            <span class="text-sm flex items-center gap-1 text-gray-100">
                                <span class="w-3 h-3 rounded-full inline-block" style="background-color:${tag.color}"></span>
                                ${UI.escapeHtml(tag.name)}
                            </span>
                        </label>
                    `).join('');
                }
            },
            renderManageTags: () => {
                const container = document.getElementById('manage-tags-container');
                if(!container) return;
                container.innerHTML = State.tags.map(tag => `
                    <div class="flex justify-between items-center p-2 border border-dashed border-white/20 rounded bg-black/10">
                        <div class="flex items-center gap-2">
                            <span class="w-4 h-4 rounded-full inline-block" style="background-color:${tag.color}"></span>
                            <span class="text-gray-100">${UI.escapeHtml(tag.name)}</span>
                        </div>
                        <button onclick="App.deleteTag('${tag.id}')" class="text-sakura hover:text-sakura-dark text-sm"><i class="fa-solid fa-trash"></i></button>
                    </div>
                `).join('');
            },

            // --- Users ---
            renderUserList: () => {
                const tbody = document.getElementById('user-list-tbody');
                if(!tbody) return;
                tbody.innerHTML = State.users.map(u => `
                    <tr class="border-b border-dashed border-white/10 hover:bg-white/5">
                        <td class="p-2 text-gray-100">${UI.escapeHtml(u.name)}</td>
                        <td class="p-2 text-gray-200">${UI.escapeHtml(u.account)}</td>
                        <td class="p-2">
                            <span class="px-2 py-1 rounded text-xs ${u.role === 'admin' ? 'bg-ao text-washi' : 'bg-gray-700 text-gray-200'} font-bold">
                                ${u.role === 'admin' ? '管理員' : '協作者'}
                            </span>
                        </td>
                        <td class="p-2 text-right">
                            <button onclick="Auth.resetUserPassword('${u.id}')" class="text-ao hover:text-ao-dark text-sm mr-3" title="重設密碼"><i class="fa-solid fa-key"></i></button>
                            <button onclick="Auth.deleteUser('${u.id}')" class="text-sakura hover:text-sakura-dark text-sm" title="刪除帳號"><i class="fa-solid fa-trash"></i></button>
                        </td>
                    </tr>
                `).join('');
            }
        };

        // Calendar Component
        window.Calendar = {
            render: () => {
                const date = State.currentCalendarDate;
                const year = date.getFullYear();
                const month = date.getMonth();
                
                document.getElementById('calendar-month').textContent = `${year - 1911}年 ${month + 1}月`;
                
                const firstDay = new Date(year, month, 1).getDay();
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const today = new Date();
                const todayStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
                
                const grid = document.getElementById('calendar-grid');
                let html = '';
                
                for (let i = 0; i < firstDay; i++) {
                    html += `<div class="p-2"></div>`;
                }
                
                for (let i = 1; i <= daysInMonth; i++) {
                    const cellDateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                    
                    const isToday = i === today.getDate() && month === today.getMonth() && year === today.getFullYear();
                    const isSelected = State.selectedDate === cellDateStr;
                    
                    const hasEntry = State.entries.some(e => e.date === cellDateStr);
                    
                    let classes = `p-2 rounded cursor-pointer transition relative hover:bg-ao hover:text-washi `;
                    if (isSelected) classes += `bg-ao text-washi font-bold `;
                    else if (isToday) classes += `border border-dashed border-ao text-ao font-bold `;
                    else classes += `text-gray-200 `;

                    html += `
                        <div class="${classes}" onclick="Calendar.selectDate('${cellDateStr}')">
                            ${i}
                            ${hasEntry ? `<div class="absolute bottom-1 left-1/2 transform -translate-x-1/2 w-1.5 h-1.5 bg-ao rounded-full ${isSelected||isToday ? 'bg-washi' : ''}"></div>` : ''}
                        </div>
                    `;
                }
                grid.innerHTML = html;
            },
            prevMonth: () => {
                State.currentCalendarDate.setMonth(State.currentCalendarDate.getMonth() - 1);
                Calendar.render();
            },
            nextMonth: () => {
                State.currentCalendarDate.setMonth(State.currentCalendarDate.getMonth() + 1);
                Calendar.render();
            },
            selectDate: (dateStr) => {
                if(State.selectedDate === dateStr) {
                    State.selectedDate = null;
                } else {
                    State.selectedDate = dateStr;
                }
                App.renderEntries();
                Calendar.render();
            }
        };

        // Bootstrap Application
        document.addEventListener('DOMContentLoaded', () => {
            Auth.init().then(() => {
                App.init();
                Calendar.render();
            });
        });

    </script>
</body>
</html>
